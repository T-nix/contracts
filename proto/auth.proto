syntax = "proto3";
import "user.proto";

package auth.v1;

service AuthService {
    rpc RegisterUser (user.v1.CreateUserRequest) returns (RegisterUserResponse) {
        option (google.api.http) = {
            post: "/auth/register"
        };
    };
    rpc LoginUser (LoginUserRequest) returns (LoginUserResponse) {
        option (google.api.http) = {
            post: "/auth/login"
        };
    };

    rpc SendOtp (SendOtpRequest) returns (SendOtpResponse) {
        option (google.api.http) = {
            post: "/auth/otp"
        };
    };
    rpc VerifyOtp (VerifyOtpRequest) returns (VerifyOtpResponse) {
        option (google.api.http) = {
            post: "/auth/verify-otp"
        };
    };
    rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse) {
        option (google.api.http) = {
            post: "/auth/refresh-token"
        };
    };
    rpc LogoutUser (LogoutUserRequest) returns (LogoutUserResponse) {
        option (google.api.http) = {
            post: "/auth/logout"
        };
    };
    rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse) {
        option (google.api.http) = {
            post: "/auth/forgot-password"
        };
    };
    rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse) {
        option (google.api.http) = {
            post: "/auth/reset-password"
        };
    };
    rpc ProviderConnect (ProviderConnectRequest) returns (ProviderConnectResponse) {
        option (google.api.http) = {
            post: "/auth/provider-connect"
        };
    };
    rpc ProviderCallback (ProviderCallbackRequest) returns (ProviderCallbackResponse) {
        option (google.api.http) = {
            post: "/auth/provider-callback"
        };
    };
}

message RegisterUserResponse {
    string nextStep = 1;
    bool ok = 2;
    optional TokenResponse token = 3;
}

message LoginUserRequest {
    string email = 1;
    string password = 2;
}

message LoginUserResponse {
    bool ok = 1;
    optional TokenResponse token = 2;
    string nextStep = 3;
}

message TokenResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message SendOtpRequest {
    string identifier = 1;
    string type = 2;
}

message SendOtpResponse {
    bool ok = 1;
}

message VerifyOtpRequest {
    string identifier = 1;
    string type = 2;
    string code = 3;
}

message VerifyOtpResponse {
    bool ok = 1;
    TokenResponse token = 2;
    string nextStep = 3;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LogoutUserRequest {
    string refresh_token = 1;
}

message LogoutUserResponse {
    bool ok = 1;
}

message ForgotPasswordRequest {
    string email = 1;
}

message ForgotPasswordResponse {
    bool ok = 1;
}

message ResetPasswordRequest {
    string token = 1;
    string password = 2;
    string password_confirm = 3;
}

message ResetPasswordResponse {
    bool ok = 1;
}

message ProviderConnectRequest {
    string provider = 1;
}

message ProviderConnectResponse {
    bool ok = 1;
    string url = 2;
}

message ProviderCallbackRequest {
    string provider = 1;
    string code = 2;
}

message ProviderCallbackResponse {
    string access_token = 1;
    string refresh_token = 2;
}