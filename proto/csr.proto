syntax = "proto3";

package csr.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service PermissionService {
    rpc CreatePermission (CreatePermissionRequest) returns (PermissionResponse);
    rpc BulkCreatePermission (BulkCreatePermissionRequest) returns (PermissionsResponse);
    rpc FindAll (FindPermissionRequest) returns (PermissionsResponse);
    rpc FindOne (GetByIdRequest) returns (PermissionResponse);

    rpc UpdatePermission (UpdatePermissionRequest) returns (PermissionResponse);
    rpc DeletePermission (GetByIdRequest) returns (google.protobuf.Empty);
}

message BulkCreatePermissionRequest {
    repeated CreatePermissionRequest data = 1;
}

message CreatePermissionRequest {
    string service = 1;
    string entity = 2;
    string action = 3;
    string status = 4;
}

message UpdatePermissionRequest {
    string id = 1;
    UpdateFields fields = 2;
}

message UpdateFields {
    optional string service = 1;
    optional string entity = 2;
    optional string action = 3;
    optional string status = 4;
}

message Permission {
    string service = 1;
    string entity = 2;
    string action = 3;
    string status = 4;
    string id = 5;
    google.protobuf.Timestamp  createdAt = 6;
    google.protobuf.Timestamp updatedAt = 7;
}

message PermissionResponse {
    optional Permission data = 1;
}

message PermissionsResponse {
    repeated Permission data = 1;
}

message FindPermissionRequest {
    optional string service = 1;
    optional string entity = 2;
    optional string action = 3;
    optional string status = 4;
}

message GetByIdRequest {
    string id = 1;
}

service RoleService {
    rpc CreateRole (CreateRoleRequest) returns (RoleResponse);
    rpc BulkCreateRole (BulkCreateRoleRequest) returns (RolesResponse);
    rpc FindAll (FindRoleRequest) returns (RolesResponse);
    rpc FindOne (GetByIdRequest) returns (RoleResponse);

    rpc UpdateRole (UpdateRoleRequest) returns (RoleResponse);
    rpc DeleteRole (GetByIdRequest) returns (google.protobuf.Empty);
}


message BulkCreateRoleRequest {
    repeated CreateRoleRequest data = 1;
}

message CreateRoleRequest {
    string code = 1;
    string status = 2;
    string description = 3;
    bool canInherit = 4;
}

message UpdateRoleRequest {
    string id = 1;
    UpdateRoleFields fields = 2;
}

message UpdateRoleFields {
    optional bool canInherit = 1;
    optional string description = 2;
    optional string status = 3;
}

message Role {
    string id = 1;
    string code = 2;
    optional string description = 3;
    bool canInherit = 4;
    string status = 5;
    google.protobuf.Timestamp  createdAt = 6;
    google.protobuf.Timestamp updatedAt = 7;
}

message RoleResponse {
    optional Role data = 1;
}

message RolesResponse {
    repeated Role data = 1;
}

message FindRoleRequest {
    optional string code = 1;
    optional string status = 2;
    optional bool canInherit = 3;
}

service PolicyService {
    rpc CreatePolicy (CreatePolicyRequest) returns (PolicyResponse);
    rpc BulkCreatePolicy (BulkCreatePolicyRequest) returns (PoliciesResponse);
    rpc FindAll (FindPolicyRequest) returns (PoliciesResponse);
    rpc FindOne (GetByIdRequest) returns (PolicyResponse);

    rpc UpdateRole (UpdatePolicyRequest) returns (PolicyResponse);
    rpc DeleteRole (GetByIdRequest) returns (google.protobuf.Empty);
}


message BulkCreatePolicyRequest {
    repeated CreatePolicyRequest data = 1;
}

message CreatePolicyRequest {
    string service = 1;
    string entity = 2;
    string action = 3;
    string entityField = 4;
    string actionType = 5;
    string valueEntity = 6;
    string valueField = 7;
}

message UpdatePolicyRequest {
    string id = 1;
    UpdatePolicyFields fields = 2;
}

message UpdatePolicyFields {
    optional string service = 1;
    optional string entity = 2;
    optional string action = 3;
    optional string entityField = 4;
    optional string actionType = 5;
    optional string valueEntity = 6;
    optional string valueField = 7;
}

message Policy {
    string id = 1;
    string service = 2;
    string entity = 3;
    string action = 4;
    string entityField = 5;
    string actionType = 6;
    string valueEntity = 7;
    string valueField = 8;
    google.protobuf.Timestamp  createdAt = 9;
    google.protobuf.Timestamp updatedAt = 10;
}

message PolicyResponse {
    optional Policy data = 1;
}

message PoliciesResponse {
    repeated Policy data = 1;
}

message FindPolicyRequest {
    optional string service = 1;
    optional string entity = 2;
    optional string action = 3;
}


service RuleService {
    rpc CreateRule (CreateRuleRequest) returns (RuleResponse);
    rpc BulkCreateRule (BulkCreateRuleRequest) returns (RulesResponse);
    rpc FindAll (FindRuleRequest) returns (RulesResponse);
    rpc FindOne (GetByIdRequest) returns (RuleResponse);
    rpc UpdateRule (UpdateRuleRequest) returns (RuleResponse);
    rpc DeleteRule (GetByIdRequest) returns (google.protobuf.Empty);
}


message BulkCreateRuleRequest {
    repeated CreatePolicyRequest data = 1;
}

message CreateRuleRequest {
    string roleId = 1;
    string permissionId = 2;
    string policyId = 3;
    string status = 4;
    int32 version = 5;
}

message UpdateRuleRequest {
    string id = 1;
    UpdatePolicyFields fields = 2;
}

message UpdateRuleFields {
    optional string status = 1;
    optional int32 version = 2;
}

message Rule {
    string id = 1;
    string roleId = 2;
    string permissionId = 3;
    string policyId = 4;
    string status = 5;
    int32 version = 6;
    google.protobuf.Timestamp  createdAt = 7;
    google.protobuf.Timestamp updatedAt = 8;
}

message RuleResponse {
    optional Rule data = 1;
}

message RulesResponse {
    repeated Rule data = 1;
}

message FindRuleRequest {
    optional string id = 1;
    optional string roleId = 2;
    optional string permissionId = 3;
    optional string policyId = 4;
    optional string status = 5;
}