syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";

service UserService {
    rpc createUser (CreateUserRequest) returns (UserResponse);
    rpc getUserById (GetUserByIdRequest) returns (UserResponse);
    rpc getUserByEmail (GetUserByEmailRequest) returns (UserResponse);
}
service AccountService {
    rpc createAccount (CreateAccountRequest) returns (AccountResponse);
    rpc getAccountById (GetAccountByIdRequest) returns (AccountResponse);
    rpc findAccounts (FindAccountRequest) returns (AccountResponse);
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string password = 3;
    optional string password_confirm = 4;
    string phone = 5;
}

message CreateAccountRequest {
    string type = 1;
    string provider = 2;
    optional string refreshToken = 3;
    optional string accessToken = 4;
    optional int32 expiredAt = 5;
    string userId = 6;
}


message GetUserByIdRequest {
    string id = 1;
}

message GetAccountByIdRequest {
    string id = 1;
}

message GetUserByEmailRequest {
    string email = 1;
}

message FindAccountRequest {
    string type = 1;
    string provider = 2;
    optional string refreshToken = 3;
    string userId = 4;
}

message UserResponse {
    optional User user = 1;
}

message AccountResponse {
    optional Account account = 1;
}

message User {
    string id = 1;
    optional string name = 2;
    string email = 3;
    optional string phone = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
    bool is_phone_verified = 8;
    bool is_email_verified = 9;
}

message Account {
    string id = 1;
    string type = 2;
    string provider = 3;
    string userId = 4;
    optional string refreshToken = 5;
    optional string accessToken = 6;
    optional int32 expiredAt = 7;

    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
}